spring.application.name=obra
server.port=8080

spring.datasource.url=jdbc:h2:mem:obra_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=senha

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----- Front-end Jakarta Faces (JoinFaces) -----
# Modo de desenvolvimento: mostra mensagens de erro detalhadas nas telas JSF.
joinfaces.faces.project-stage=Development
# Recarrega as telas .xhtml sem reiniciar a aplicacao (util durante o desenvolvimento).
joinfaces.faces.facelets-refresh-period=1
